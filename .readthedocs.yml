# Ref: https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

sphinx:
  configuration: docs/source/conf.py

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_create_environment:
      # Install uv using pip
      - pip install uv
    create_environment:
      # Create virtual environment in ReadTheDocs expected location
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      # Install project with doc dependencies using uv
      # UV_PROJECT_ENVIRONMENT tells uv to use ReadTheDocs venv instead of creating .venv
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --extra doc
